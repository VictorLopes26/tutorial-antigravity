<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Antigravity - Tutorial Interativo</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- App Container -->
    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-dot"></span>
                    <h2>Antigravity</h2>
                </div>
                <p class="subtitle">Guia de Instalação e Configuração</p>
            </div>

            <!-- Progress Tracker -->
            <div class="progress-container">
                <div class="progress-details">
                    <span>Progresso Geral</span>
                    <span id="progress-percentage">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>

            <!-- Navigation Links -->
            <nav class="nav-menu">
                <ul id="nav-list">
                    <!-- Items generated by JS -->
                </ul>
            </nav>

            <div class="sidebar-footer">
                <p>SENAC SP &copy; 2026</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">

            <!-- Top Controls Bar -->
            <header class="top-bar">
                <button class="menu-toggle" id="menu-toggle" aria-label="Alternar Menu">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
                    </svg>
                </button>

                <div class="view-toggles">
                    <button class="toggle-btn active" id="btn-slides-view" title="Visualização em Slides">
                        <svg viewBox="0 0 24 24" width="18" height="18" class="icon">
                            <path fill="currentColor"
                                d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z" />
                        </svg>
                        Slides
                    </button>
                    <button class="toggle-btn" id="btn-doc-view" title="Visualização em Documento Único">
                        <svg viewBox="0 0 24 24" width="18" height="18" class="icon">
                            <path fill="currentColor"
                                d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
                        </svg>
                        Documento Completo
                    </button>
                </div>

                <div class="utility-controls">
                    <!-- Dark/Light Theme Toggle -->
                    <button class="theme-toggle-btn" id="theme-toggle" title="Alternar Modo Escuro/Claro">
                        <svg id="theme-icon-sun" viewBox="0 0 24 24" width="20" height="20" class="theme-icon">
                            <path fill="currentColor"
                                d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zM7.05 18.01c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41z" />
                        </svg>
                        <svg id="theme-icon-moon" viewBox="0 0 24 24" width="20" height="20" class="theme-icon hidden">
                            <path fill="currentColor"
                                d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.6-.1 1.2.3 1.3.9.1.6-.2 1.2-.8 1.4-3.1 1.2-5.1 4.2-5.1 7.5 0 4.4 3.6 8 8 8 3.3 0 6.3-2 7.5-5.1.2-.6.8-.9 1.4-.8.6.1 1 .7.9 1.3-.9 4.7-5 8.2-9.8 8.2z" />
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Slides View Layout -->
            <section class="slides-view-container" id="slides-view-section">
                <div class="slide-card glass" id="slide-card">
                    <!-- Dynamic Slide Content -->
                    <div id="slide-content-area"></div>
                </div>

                <!-- Slide Navigation Controls -->
                <div class="slide-navigation">
                    <button class="nav-control-btn" id="btn-prev" disabled>
                        <svg viewBox="0 0 24 24" width="20" height="20" class="icon">
                            <path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                        </svg>
                        Anterior
                    </button>
                    <span class="slide-indicator" id="slide-indicator">Slide 1 de 9</span>
                    <button class="nav-control-btn active" id="btn-next">
                        Próximo
                        <svg viewBox="0 0 24 24" width="20" height="20" class="icon">
                            <path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                        </svg>
                    </button>
                </div>
            </section>

            <!-- Full Document View Layout (Hidden by default) -->
            <section class="document-view-container hidden" id="document-view-section">
                <div class="document-card glass" id="document-content-area">
                    <!-- Dynamic Full Doc Content -->
                </div>
            </section>

        </main>

        <!-- Toast Notification (for copy command, etc) -->
        <div class="toast" id="toast">Comando copiado!</div>

    </div>

    <!-- JS File -->
    <script src="app.js"></script>
</body>

</html>
